<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="view.php">Inventory Manager</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white py-3">
                        <h5 class="mb-0">Add New Inventory Item</h5>
                    </div>
                    <div class="card-body p-4">
                        <form action="save.php" method="POST" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Product Name</label>
                                <input type="text" name="item_name" class="form-control" placeholder="e.g. Laptop" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Barcode / SKU</label>
                                <div class="input-group">
                                    <input type="text" name="item_sku" id="item_sku" class="form-control" placeholder="Scan or type barcode">
                                    <button type="button" class="btn btn-secondary" onclick="toggleScanner()">📷 Scan</button>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Category</label>
                                <select name="item_category" class="form-select" required>
                                    <option value="Electronics">Electronics</option>
                                    <option value="Furniture">Furniture</option>
                                    <option value="Stationery">Stationery</option>
                                    <option value="Food & Beverage">Food & Beverage</option>
                                    <option value="Other">Other</option>
                                </select>

                            <div id="reader" style="width: 100%; max-width: 400px; display: none;" class="mt-2 border rounded"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Price ($)</label>
                                <input type="number" step="0.01" name="item_price" class="form-control" placeholder="0.00" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Product Image</label>
                                <input type="file" name="product_image" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Quantity in Stock</label>
                                <input type="number" name="item_quantity" class="form-control" placeholder="0" min="0" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success">Save Product</button>
                                <a href="view.php" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        let html5QrCode;

        function toggleScanner() {
            const readerDiv = document.getElementById('reader');
            
            if (readerDiv.style.display === 'none' || readerDiv.style.display === '') {
                readerDiv.style.display = 'block';
                html5QrCode = new Html5Qrcode("reader");
                
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: { width: 250, height: 150 } },
                    (decodedText) => {
                        document.getElementById('item_sku').value = decodedText;
                        stopScanner();
                        alert("Barcode Scanned: " + decodedText);
                    },
                    (errorMessage) => { /* scanning... */ }
                ).catch(err => alert("Camera error: " + err));
            } else {
                stopScanner();
            }
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').style.display = 'none';
                    // Optional: clear the object so it can be restarted fresh
                    html5QrCode = null; 
                }).catch(err => console.error("Failed to stop", err));
            }
        }
    </script>
</body>
</html>
</body>
</html>
